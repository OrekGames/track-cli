# Request-to-Response Mapping for issue-history scenario

# =============================================================================
# Project Operations
# =============================================================================

[[responses]]
method = "list_projects"
file = "list_projects.json"

[[responses]]
method = "get_project"
file = "get_project_DEMO.json"
[responses.args]
id = "DEMO"

[[responses]]
method = "get_project_custom_fields"
file = "project_custom_fields.json"
[responses.args]
project_id = "*"

# =============================================================================
# Issue Operations
# =============================================================================

[[responses]]
method = "get_issue"
file = "get_issue_DEMO-1.json"
[responses.args]
id = "DEMO-1"

[[responses]]
method = "get_issue"
file = "get_issue_DEMO-2.json"
[responses.args]
id = "DEMO-2"

# =============================================================================
# History Operations
# =============================================================================

[[responses]]
method = "get_issue_history"
file = "get_issue_history_DEMO-1.json"
[responses.args]
issue_id = "DEMO-1"

[[responses]]
method = "get_issue_history"
file = "get_issue_history_DEMO-2.json"
[responses.args]
issue_id = "DEMO-2"

# =============================================================================
# Supporting Operations
# =============================================================================

[[responses]]
method = "list_tags"
file = "list_tags.json"
